# Qdrant Vector Database for AgentBrain
# Run: docker-compose -f docker/qdrant-compose.yml up -d

version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: agentbrain-qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC API
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  qdrant_storage:
    driver: local
